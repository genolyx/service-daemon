# Production-style run (image에 app/portal baked-in). 앱 로그: docker logs (파이프라인 로그는 /data/log).
# 사용 전: cp .env.compose.example .env.compose 후 HOST_UID / HOST_GID / DOCKER_GID 설정.
# 실행: docker compose --env-file .env.compose up -d --build

services:
  service-daemon:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        TZ: ${TZ:-Asia/Seoul}
        HOST_UID: ${HOST_UID}
        HOST_GID: ${HOST_GID}
        DOCKER_GID: ${DOCKER_GID}
    image: service-daemon:latest
    container_name: ${APP_ENV:-prod}-service-daemon
    restart: unless-stopped

    env_file:
      - path: ${ENV_FILE:-.env.docker}
        required: true
      - path: .env
        required: false

    # Overrides env_file so ENABLED_SERVICES always matches the portal (health_screening, whole_exome, …).
    environment:
      ENABLED_SERVICES: carrier_screening,whole_exome,health_screening,sgnipt
      CARRIER_SCREENING_HOST: ${CARRIER_SCREENING_HOST:-/home/ken/gx-exome}

    command: /bin/sh -c "uvicorn app.main:app --host 0.0.0.0 --port $${APP_PORT:-8000} --no-access-log"

    ports:
      - "${HOST_PORT:-8000}:${APP_PORT:-8000}"

    user: "${HOST_UID}:${HOST_GID}"
    group_add:
      - "${DOCKER_GID}"

    volumes:
      # Host app + portal → pick up Python/UI changes without rebuilding the image.
      - ./app:/app/app:ro
      - ./portal:/app/portal:ro
      # Carrier PDF Jinja templates (e.g. dark_genes supplement in carrier_EN.html) — without this,
      # WeasyPrint uses templates baked into the image until the next --build.
      - ./data/carrier_report:/app/data/carrier_report:ro
      - ${BASE_DIR:-/data}:/data
      - ${CARRIER_SCREENING_HOST:-/home/ken/gx-exome}:/data/gx-exome
      - ${CARRIER_SCREENING_HOST:-/home/ken/gx-exome}:${CARRIER_SCREENING_HOST:-/home/ken/gx-exome}
      - ${SGNIPT_SRC_HOST:-/home/ken/sgnipt}:${SGNIPT_SRC_HOST:-/home/ken/sgnipt}:ro
      - ${SGNIPT_LAYOUT_HOST:-/home/ken/sgNIPT}:${SGNIPT_LAYOUT_HOST:-/home/ken/sgNIPT}
      - ${SGNIPT_LAYOUT_HOST:-/home/ken/sgNIPT}/data:${BASE_DIR:-/data}/sgnipt_work/data:ro
      - ${SGNIPT_LAYOUT_HOST:-/home/ken/sgNIPT}/config:${BASE_DIR:-/data}/sgnipt_work/config:ro
      - ${SGNIPT_LAYOUT_HOST:-/home/ken/sgNIPT}/fastq:${BASE_DIR:-/data}/sgnipt_work/fastq
      - ${BASE_DIR:-/data}/reference:/data/reference:ro
      - ${CARRIER_SCREENING_PIPELINE_DIR:-/opt/pipelines/carrier-screening}:/opt/pipelines/carrier-screening:ro
      - ${NIPT_PIPELINE_DIR:-/opt/pipelines/nipt}:/opt/pipelines/nipt:ro
      - ${SGNIPT_PIPELINE_DIR:-/opt/pipelines/sgnipt}:/opt/pipelines/sgnipt:ro
      # - ${NEXTFLOW_HOST_PATH:-/usr/local/bin/nextflow}:/usr/local/bin/nextflow:ro
      - /var/run/docker.sock:/var/run/docker.sock
      # gene_knowledge SQLite (Gemini cache; rw — see GENE_KNOWLEDGE_DB in .env.docker)
      - ./data/gene_knowledge.db:/data/service-daemon/gene_knowledge.db
      # snpEff JAR+config: 이미지에 포함했으면 생략 가능. 호스트 복사본을 쓰려면 주석 해제:
      # - ${SNPEFF_TOOLS_HOST:-./tools/snpEff}:/opt/tools/snpEff:ro

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:$${APP_PORT:-8000}/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
