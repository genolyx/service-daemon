version: "3.8"

services:
  service-daemon:
    build: .
    container_name: service-daemon
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    volumes:
      # Data directories
      - ${BASE_DIR:-/data}/fastq:/data/fastq
      - ${BASE_DIR:-/data}/analysis:/data/analysis
      - ${BASE_DIR:-/data}/output:/data/output
      - ${BASE_DIR:-/data}/log:/data/log
      # Reference data (read-only)
      - ${BASE_DIR:-/data}/reference:/data/reference:ro
      # Pipeline directories (read-only)
      - ${CARRIER_SCREENING_PIPELINE_DIR:-/opt/pipelines/carrier-screening}:/opt/pipelines/carrier-screening:ro
      - ${NIPT_PIPELINE_DIR:-/opt/pipelines/nipt}:/opt/pipelines/nipt:ro
      - ${SGNIPT_PIPELINE_DIR:-/opt/pipelines/sgnipt}:/opt/pipelines/sgnipt:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
